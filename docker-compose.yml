version: '3.8'

services:
  db:
    image: postgres:16
    container_name: student_ai_db
    restart: always
    environment:
      POSTGRES_DB: student_ai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "8086:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: .
    container_name: student_ai_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: student_ai_db
      DB_USER: postgres
      DB_PASSWORD: 12345
    command: python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: .
    container_name: student_ai_frontend
    restart: always
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      API_URL: http://backend:8000   # ← Вот главное изменение!
    command: python -m streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true

volumes:
  postgres_data: