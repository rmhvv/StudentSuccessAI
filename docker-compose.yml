version: '3.8'

services:
  db:
    image: postgres:16
    container_name: student_ai_db
    restart: always
    environment:
      POSTGRES_DB: student_ai_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "8086:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: .
    container_name: student_ai_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: student_ai_db
      DB_USER: postgres
      DB_PASSWORD: 12345
    command: >
      sh -c "
        echo 'Waiting for database...' &&
        sleep 8 &&
        python init_db.py &&
        python train_model.py &&
        echo 'Database and model initialized successfully!' &&
        python -m uvicorn main:app --host 0.0.0.0 --port 8000 --reload
      "

  frontend:
    build: .
    container_name: student_ai_frontend
    restart: always
    ports:
      - "8501:8501"
    depends_on:
      - backend
    environment:
      API_URL: http://backend:8000
    command: python -m streamlit run app.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true

volumes:
  postgres_data: